<div class="scripture-container" data-id="853fc9c2"><div class="scripture-text">无论是希腊人、化外人、聪明人、愚拙人，我都欠他们的债，所以情愿尽我的力量，将福音也传给你们在罗马的人。我不以福音为耻；这福音本是　神的大能，要救一切相信的，先是犹太人，后是希腊人。因为　神的义正在这福音上显明出来；这义是本于信，以致于信。如经上所记：“义人必因信得生。”</div><div class="scripture-ref">(罗马书 1:14-17 和合本)</div></div>
