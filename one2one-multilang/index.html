<!DOCTYPE html>

<html lang="zh-CN">
<head>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>一对一门徒训练课程</title>
<style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            padding: 40px 20px;
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .subtitle {
            font-size: 1.2em;
            opacity: 0.9;
        }

        .chapters {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
        }

        .chapter-item {
            display: block;
            padding: 20px;
            margin-bottom: 15px;
            background: #f8f9fa;
            border-radius: 10px;
            text-decoration: none;
            transition: all 0.3s;
            border-left: 5px solid #667eea;
        }

        .chapter-item:hover {
            background: #667eea;
            transform: translateX(10px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }

        .chapter-title {
            color: #333;
            font-size: 1.3em;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .chapter-item:hover .chapter-title {
            color: white;
        }

        .chapter-subtitle {
            color: #667eea;
            font-size: 0.95em;
        }

        .chapter-item:hover .chapter-subtitle {
            color: rgba(255,255,255,0.9);
        }

        footer {
            text-align: center;
            color: white;
            padding: 30px 20px;
            font-size: 0.9em;
            opacity: 0.8;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2em;
            }

            .chapters {
                padding: 20px;
            }

            .chapter-item {
                padding: 15px;
            }

            .chapter-title {
                font-size: 1.1em;
            }
        }
    
        .home-btn {
            display: inline-block;
            color: white;
            text-decoration: none;
            border: 1px solid rgba(255,255,255,0.5);
            padding: 8px 15px;
            border-radius: 20px;
            margin-bottom: 20px;
            font-size: 0.9em;
            transition: all 0.3s;
            background: rgba(255,255,255,0.1);
        }
        .home-btn:hover {
            background: rgba(255,255,255,0.2);
            transform: translateY(-2px);
        }
</style>
<link href="css/multilang.css" rel="stylesheet"/></head>
<body>
<div class="container">
<header>
<a href="../index.html" class="home-btn"><i class="fas fa-home"></i> 返回主页</a>
<h1>📖 一对一</h1>
<div class="subtitle">个人跟进及带门徒</div>
</header>
<div class="chapters">
<a class="chapter-item" href="preface.html">
<div class="chapter-title">前言</div>
</a>
<a class="chapter-item" href="intro.html">
<div class="chapter-title">开始作门徒</div>
<div class="chapter-subtitle">三关系</div>
</a>
<a class="chapter-item" href="chapter_1.html">
<div class="chapter-title">新起点 得救</div>
<div class="chapter-subtitle">第1课</div>
</a>
<a class="chapter-item" href="chapter_2.html">
<div class="chapter-title">新主人 主权</div>
<div class="chapter-subtitle">第2课</div>
</a>
<a class="chapter-item" href="chapter_3.html">
<div class="chapter-title">新方向 悔改</div>
<div class="chapter-subtitle">第3课</div>
</a>
<a class="chapter-item" href="chapter_4.html">
<div class="chapter-title">新生命 洗礼</div>
<div class="chapter-subtitle">第4课</div>
</a>
<a class="chapter-item" href="chapter_5.html">
<div class="chapter-title">新操练 灵修</div>
<div class="chapter-subtitle">第5课</div>
</a>
<a class="chapter-item" href="chapter_6.html">
<div class="chapter-title">新关系 教会</div>
<div class="chapter-subtitle">第6课</div>
</a>
<a class="chapter-item" href="chapter_7.html">
<div class="chapter-title">新使命 带门徒</div>
<div class="chapter-subtitle">第7课</div>
</a>
</div>
<footer>
<p>耶稣对他们说:"来跟从我,我要叫你们得人如得鱼一样。"</p>
<p>(马可福音 1:17)</p>
</footer>
</div>

            document.addEventListener('DOMContentLoaded', () => {
                window.bibleManager.init('index');
            });
        </script></body>
</html>
