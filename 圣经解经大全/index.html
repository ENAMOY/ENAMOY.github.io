<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>圣经解经大全</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --secondary-color: #8e44ad;
            --bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', Arial, sans-serif;
            line-height: 1.8;
            color: #333;
            background: var(--bg-gradient);
            min-height: 100vh;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        .header {
            text-align: center;
            padding: 40px 20px;
            color: white;
        }
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        .header p {
            font-size: 1.2em;
            opacity: 0.9;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin: 30px 0;
        }
        .stat-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .stat-number {
            font-size: 2.5em;
            font-weight: bold;
            color: var(--secondary-color);
        }
        .stat-label {
            font-size: 1em;
            color: #666;
            margin-top: 5px;
        }
        .section {
            background: white;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .section h2 {
            font-size: 1.8em;
            color: var(--primary-color);
            border-bottom: 3px solid var(--secondary-color);
            padding-bottom: 10px;
            margin-bottom: 20px;
        }
        .book-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
        }
        .book-card {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            border-radius: 12px;
            padding: 20px;
            text-decoration: none;
            color: #333;
            transition: all 0.3s ease;
            border: 2px solid transparent;
            display: block;
            cursor: pointer;
        }
        .book-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            border-color: var(--secondary-color);
        }
        .book-card h3 {
            font-size: 1.1em;
            color: var(--primary-color);
            margin-bottom: 8px;
        }
        .book-card .info {
            font-size: 0.85em;
            color: #666;
        }
        .book-card .badge {
            display: inline-block;
            background: var(--secondary-color);
            color: white;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.75em;
            margin-top: 8px;
        }
        .back-link {
            display: inline-block;
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            background: rgba(255,255,255,0.2);
            border-radius: 20px;
            margin-bottom: 20px;
            transition: background 0.3s;
        }
        .back-link:hover {
            background: rgba(255,255,255,0.3);
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            overflow-y: auto;
        }
        .modal-content {
            background: white;
            max-width: 900px;
            margin: 50px auto;
            padding: 40px;
            border-radius: 20px;
            position: relative;
        }
        .modal-close {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 2em;
            cursor: pointer;
            color: #666;
        }
        .modal-close:hover {
            color: #333;
        }
        .loading {
            text-align: center;
            padding: 50px;
            color: #666;
        }
        footer {
            text-align: center;
            padding: 30px;
            color: white;
            opacity: 0.8;
        }
        @media (max-width: 768px) {
            .stats { grid-template-columns: repeat(2, 1fr); }
            .book-grid { grid-template-columns: repeat(2, 1fr); }
            .header h1 { font-size: 2em; }
        }
    </style>
</head>

        // 初始化页面
        document.addEventListener('DOMContentLoaded', function() {
            renderBooks();
        });

        // 渲染书卷列表
        function renderBooks() {
            const oldTestament = document.getElementById('old-testament');
            const newTestament = document.getElementById('new-testament');

            let currentCategory = '';

            books.forEach(book => {
                const card = document.createElement('a');
                card.className = 'book-card';
                card.onclick = () => loadBook(book.name);
                card.innerHTML = `
                    <h3>${book.name}</h3>
                    <div class="info">${book.chapters}章 · ${book.verses.toLocaleString()}节</div>
                    <div class="badge">${book.sections}段</div>
                `;

                if (book.testament === 'old') {
                    oldTestament.appendChild(card);
                } else {
                    newTestament.appendChild(card);
                }
            });
        }

        // 加载书卷内容
        async function loadBook(bookName) {
            const modal = document.getElementById('modal');
            const modalBody = document.getElementById('modal-body');

            modal.style.display = 'block';
            modalBody.innerHTML = '<div class="loading">加载中...</div>';

            try {
                const response = await fetch(`${bookName}解经大全/index.html`);
                if (response.ok) {
                    const html = await response.text();
                    // 提取body内容
                    const match = html.match(/<body[^>]*>([\s\S]*)<\/body>/i);
                    if (match) {
                        let bodyHtml = match[1];
                        // 注入<base>标签使所有相对链接正确解析到书卷目录
                        const bookPrefix = bookName + '解经大全/';
                        bodyHtml = '<base href="' + bookPrefix + '">' + bodyHtml;
                        modalBody.innerHTML = bodyHtml;
                    } else {
                        modalBody.innerHTML = html;
                    }
                } else {
                    modalBody.innerHTML = '<div class="loading">内容加载失败</div>';
                }
            } catch (error) {
                modalBody.innerHTML = '<div class="loading">内容加载失败</div>';
            }
        }

        // 关闭弹窗
        function closeModal() {
            document.getElementById('modal').style.display = 'none';
        }

        // ESC键关闭弹窗
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeModal();
            }
        });
